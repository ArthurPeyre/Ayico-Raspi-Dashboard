<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raspberry Pi Monitor</title>

  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div id="app">
    <header>
      <h1>Raspberry Pi 5 – Monitoring</h1>
      <p>Up depuis <span id="uptime">--</span></p>
    </header>

    <main>
      <div class="section">
        <li>🌡️ Température : <span id="temp">--</span> °C</li>
        <li>⚙️ CPU load : <span id="cpu">--</span></li>
        <li>🧠 RAM : <span id="ram">--</span></li>
        <li>💾 Disque : <span id="disk">--</span></li>
        lol
      </div>

      <div class="section">
        <h2>Docker Containers</h2>
        <div id="dockerContainers"></div>
      </div>
    </main>
  </div>



  <script>
    function refresh() {
      fetch('/api/dashboard')
        .then(r => r.json())
        .then(d => {
          document.getElementById('temp').innerText = d.temperature;
          document.getElementById('cpu').innerText = d.cpu_load;
          document.getElementById('ram').innerText =
            d.ram.used + " / " + d.ram.total + " MB";
          document.getElementById('disk').innerText =
            d.disk.used + " / " + d.disk.total + " GB";
          document.getElementById('uptime').innerHTML = d.uptime;
          document.getElementById('dockerContainers').innerText = "";
          for (const container of d.docker_containers) {
            document.getElementById('dockerContainers').innerHTML += `<li>Nom: ${container.name} | Image: ${container.image} | Status: ${container.status}</li>`;
          }
        });
    }

    refresh();
    setInterval(refresh, 2000); // Call API every 2s
  </script>
</body>
</html>
