<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raspberry Pi Monitor</title>

  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div id="app">
    <header>
      <h1>Raspberry Pi 5 – Monitoring</h1>
      <p>Up depuis <span id="uptime">--</span></p>
    </header>

    <main>
      <div class="section">
        <li>🌡️ Température : <span id="temp">--</span> °C</li>
        <li>⚙️ CPU load : <span id="cpu">--</span></li>
        <li>🧠 RAM : <span id="ramU">--</span> / <span id="ramT">--</span> MB - Average : <span id="ramAverage">--</span> MB</li>
        <li>💾 Disque : <span id="diskU">--</span> / <span id="diskT">--</span> GB</li>
      </div>

      <div class="section">
        <h2>Docker Containers</h2>
        <div id="dockerContainers"></div>
      </div>
    </main>
  </div>



  <script>
    const data = {
      temp: document.getElementById('temp'),
      cpu: document.getElementById('cpu'),
      ram: {
        used: document.getElementById('ramU'),
        total: document.getElementById('ramT'),
        history: []
      },
      disk: {
        used: document.getElementById('diskU'),
        total: document.getElementById('diskT')
      },
      uptime: document.getElementById('uptime'),
      dockerContainers: document.getElementById('dockerContainers')
    }

    const setRam = (val) => {
      if (data.ram.total !== val.total) {
        data.ram.total.innerText = val.total;
      }
      if (data.ram.used.innerText !== val.used) {
        data.ram.used.innerText = val.used;
      }
      if (data.ram.history.length >= 10) {
        data.ram.history.shift();
      }
      data.ram.history.push(val.used);
      const average = (data.ram.history.reduce((acc, val) => acc + val, 0) / data.ram.history.length);
      document.getElementById("ramAverage").innerText = average.toFixed(1);
    }

    const setDisk = (val) => {
      if (data.disk.total !== val.total) {
        data.disk.total.innerText = val.total;
      }
      if (data.disk.used.innerText !== val.used) {
        data.disk.used.innerText = val.used;
      }
    }

    function refresh() {
      fetch('/api/dashboard')
        .then(r => r.json())
        .then(d => {
          data.temp.innerText = d.temperature;

          data.cpu.innerText = d.cpu_load;

          setRam(d.ram)

          setDisk(d.disk);

          data.uptime.innerText = d.uptime;

          data.dockerContainers.innerHTML = "";
          for (const container of d.docker_containers) {
            data.dockerContainers.innerHTML += `<li>Nom: ${container.name} | Image: ${container.image} | Status: ${container.status}</li>`;
          }
        });
    }


    window.addEventListener('DOMContentLoaded', () => {
      refresh();
      setInterval(refresh, 200); // Call API every 2s
    });

  </script>
</body>
</html>
